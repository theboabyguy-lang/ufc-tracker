name: Check UFC Database

on:
  schedule:
    - cron: '0 12 * * *' # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch: # Allows you to run it manually whenever you want

jobs:
  check-database:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install website scraper tools
      run: |
        pip install requests beautifulsoup4

    - name: Run the tracker script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python tracker.py

    - name: Save updated fighter list
      run: |
        git config --global user.name "UFC Bot"
        git config --global user.email "bot@ufc.com"
        git add known_fighters.json
        git commit -m "Update fighter database" || exit 0
        git push
